<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager - Login & Registro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="container-fluid auth-container">
        <div class="row h-100 justify-content-center align-items-center">
            <!-- Panel Login -->
            <div class="col-md-5">
                <div class="card shadow-lg auth-card" id="loginCard">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-tasks text-primary" style="font-size: 48px;"></i>
                            <h2 class="mt-3 fw-bold">TaskManager</h2>
                            <p class="text-muted">Organiza tus tareas de forma eficiente</p>
                        </div>

                        <!-- Login Form -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">
                                    <i class="fas fa-envelope"></i> Correo Electrónico
                                </label>
                                <input 
                                    type="email" 
                                    class="form-control form-control-lg" 
                                    id="loginEmail" 
                                    placeholder="tu@email.com"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">
                                    <i class="fas fa-lock"></i> Contraseña
                                </label>
                                <div class="input-group">
                                    <input 
                                        type="password" 
                                        class="form-control form-control-lg" 
                                        id="loginPassword" 
                                        placeholder="Ingresa tu contraseña"
                                        required
                                    >
                                    <button 
                                        class="btn btn-outline-secondary" 
                                        type="button" 
                                        id="toggleLoginPassword"
                                    >
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                            </button>
                        </form>

                        <hr>

                        <p class="text-center text-muted mb-0">
                            ¿No tienes cuenta? 
                            <a href="#" id="toggleToRegister" class="text-primary fw-bold">
                                Regístrate aquí
                            </a>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Panel Registro -->
            <div class="col-md-5" id="registerCard" style="display: none;">
                <div class="card shadow-lg auth-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-plus text-success" style="font-size: 48px;"></i>
                            <h2 class="mt-3 fw-bold">Crear Cuenta</h2>
                            <p class="text-muted">Únete a TaskManager hoy</p>
                        </div>

                        <!-- Register Form -->
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="registerName" class="form-label">
                                    <i class="fas fa-user"></i> Nombre Completo
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control form-control-lg" 
                                    id="registerName" 
                                    placeholder="Tu nombre"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="registerEmail" class="form-label">
                                    <i class="fas fa-envelope"></i> Correo Electrónico
                                </label>
                                <input 
                                    type="email" 
                                    class="form-control form-control-lg" 
                                    id="registerEmail" 
                                    placeholder="tu@email.com"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="registerPassword" class="form-label">
                                    <i class="fas fa-lock"></i> Contraseña
                                </label>
                                <div class="input-group">
                                    <input 
                                        type="password" 
                                        class="form-control form-control-lg" 
                                        id="registerPassword" 
                                        placeholder="Mínimo 6 caracteres"
                                        required
                                    >
                                    <button 
                                        class="btn btn-outline-secondary" 
                                        type="button" 
                                        id="toggleRegisterPassword"
                                    >
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="registerConfirmPassword" class="form-label">
                                    <i class="fas fa-check-circle"></i> Confirmar Contraseña
                                </label>
                                <input 
                                    type="password" 
                                    class="form-control form-control-lg" 
                                    id="registerConfirmPassword" 
                                    placeholder="Repite tu contraseña"
                                    required
                                >
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 mb-3">
                                <i class="fas fa-user-check"></i> Registrarse
                            </button>
                        </form>

                        <hr>

                        <p class="text-center text-muted mb-0">
                            ¿Ya tienes cuenta? 
                            <a href="#" id="toggleToLogin" class="text-primary fw-bold">
                                Inicia sesión
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="toastContainer"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
